<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Paravita · Poster Crew</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7;
  --card:#ffffff;
  --dark:#1a1a2e;
  --border:rgba(0,0,0,0.08);
  --radius:14px;
  --c-england:#2563eb;
  --c-netherlands:#7c3aed;
  --c-germany:#dc2626;
  --c-portugal:#059669;
  --c-spain:#ea580c;
  --c-usa:#1a1a2e;
  --c-texas:#6d28d9;
  --c-canada:#db2777;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;font-size:14px}
h1,h2,h3,.metric-val,.chart-title{font-family:'Space Grotesk',sans-serif}

/* HEADER */
header{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:0 24px;height:58px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:1000;
}
.logo{display:flex;align-items:center;gap:8px;font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--dark)}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--dark);display:inline-block}
.header-right{display:flex;align-items:center;gap:16px}
.saved-indicator{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:#16a34a}
.saved-indicator .dot{width:7px;height:7px;border-radius:50%;background:#16a34a}
.saved-indicator.saving{color:#f59e0b}
.saved-indicator.saving .dot{background:#f59e0b}
.btn-add{background:var(--dark);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'Inter',sans-serif;transition:opacity 0.15s}
.btn-add:hover{opacity:0.85}

/* METRICS */
.metrics-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:16px 24px}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.metric-card.danger{background:#fef2f2;border-color:#fecaca}
.metric-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#6b7280;margin-bottom:6px}
.metric-val{font-size:22px;font-weight:700;color:var(--dark);line-height:1.1}
.metric-card.danger .metric-val{color:#dc2626}
.metric-sub{font-size:12px;color:#6b7280;margin-top:4px}
.progress-bar{height:5px;background:#e5e7eb;border-radius:3px;margin-top:10px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:var(--dark);transition:width 0.4s}

/* MAP + CHARTS LAYOUT */
.map-charts-row{display:grid;grid-template-columns:1fr 310px;gap:12px;padding:0 24px 12px}
#map{height:420px;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.charts-col{display:flex;flex-direction:column;gap:12px;height:420px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;height:420px;flex:none;overflow:hidden}
.chart-title{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--dark)}

/* SHIPMENT TRACKER — full-width section */
.ship-section{padding:0 24px 12px}
.ship-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.ship-panel-header{padding:14px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ship-panel-title{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--dark)}
.ship-panel-counts{display:flex;gap:8px}
.ship-count-badge{font-size:11px;font-weight:600;padding:2px 9px;border-radius:10px}
.ship-count-badge.delivered{background:#dcfce7;color:#166534}
.ship-count-badge.transit{background:#dbeafe;color:#1e40af}
.ship-count-badge.pending{background:#f3f4f6;color:#6b7280}
/* card grid for full-width layout */
.ship-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;padding:14px 20px}
.ship-row{background:#fafafa;border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:7px}
.ship-row-name{font-weight:600;font-size:13px;color:var(--dark)}
.ship-row-detail{font-size:11px;color:#6b7280}
.ship-fields{display:flex;flex-direction:column;gap:5px;width:100%}
.ship-field-row{display:flex;gap:4px;align-items:center}
.ship-inline-select,.ship-inline-input{
  border:1px solid transparent;border-radius:5px;
  padding:3px 6px;font-size:11px;font-family:'Inter',sans-serif;
  background:#f9fafb;color:var(--dark);
  transition:border-color 0.15s;
}
.ship-inline-select:focus,.ship-inline-input:focus{outline:none;border-color:#d1d5db;background:#fff}
.ship-inline-select{cursor:pointer}
.ship-tracking-input{flex:1;min-width:0}
.ship-status-badge{
  display:inline-flex;align-items:center;font-size:10px;font-weight:600;
  padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;
}
.status-none{background:#f3f4f6;color:#9ca3af}
.status-label{background:#fef3c7;color:#92400e}
.status-transit{background:#dbeafe;color:#1e40af}
.status-out{background:#fde68a;color:#92400e}
.status-delivered{background:#dcfce7;color:#166534}
.status-exception{background:#fee2e2;color:#991b1b}
.ship-eta-input{width:90px;font-size:11px}
.ship-empty{text-align:center;padding:20px 14px;color:#9ca3af;font-size:12px}

/* TRACKER */
.tracker{padding:0 24px 40px}
.summary-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 20px;margin-bottom:12px;display:flex;gap:28px;flex-wrap:wrap;align-items:center}
.summary-item{display:flex;align-items:center;gap:8px;font-size:13px}
.summary-item strong{font-weight:700;font-family:'Space Grotesk',sans-serif;font-size:15px}
.summary-divider{width:1px;height:24px;background:var(--border)}

.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{
  background:var(--bg);font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.05em;color:#6b7280;
  padding:10px 10px;text-align:left;white-space:nowrap;
  border-bottom:1px solid var(--border);position:sticky;top:58px;z-index:10;
}
tr.country-group td{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12px;letter-spacing:0.06em;text-transform:uppercase;padding:8px 14px;color:#fff}
tbody tr:not(.country-group):hover{background:#fafafa}
tbody tr:not(.country-group) td{padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:not(.country-group):last-child td{border-bottom:none}

.inline-input{
  border:1px solid transparent;border-radius:6px;
  padding:4px 7px;font-size:12px;font-family:'Inter',sans-serif;
  background:transparent;color:var(--dark);
  width:100%;min-width:55px;
  transition:border-color 0.15s,background 0.15s;
}
.inline-input:focus{outline:none;border-color:#d1d5db;background:#f9fafb}
.inline-input.wide{min-width:130px}
.inline-input.addr{min-width:120px}

.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap}
.badge-paid{background:#dcfce7;color:#166534}
.badge-pending{background:#fef3c7;color:#92400e}
.badge-unpaid{background:#fee2e2;color:#991b1b}
.badge-partial{background:#ede9fe;color:#5b21b6}

/* pay+amount cell */
.pay-cell{display:flex;flex-direction:column;gap:4px;align-items:flex-start}
.pay-cell-top{display:flex;align-items:center;gap:5px}
.pay-amt-input{border:1px solid transparent;border-radius:5px;padding:3px 6px;font-size:12px;font-family:'Inter',sans-serif;background:#f9fafb;color:var(--dark);width:68px;transition:border-color 0.15s}
.pay-amt-input:focus{outline:none;border-color:#d1d5db;background:#fff}
.total-paid-cell{font-weight:700;font-size:13px;color:#166534;white-space:nowrap}

input[type=checkbox]{width:15px;height:15px;accent-color:var(--dark);cursor:pointer;flex-shrink:0}

.btn-edit{background:none;border:none;cursor:pointer;color:#9ca3af;font-size:15px;padding:4px;border-radius:6px;transition:color 0.15s,background 0.15s}
.btn-edit:hover{color:var(--dark);background:#f3f4f6}
.streets-cell{font-size:11px;color:#6b7280;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:2000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:20px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;padding:28px 32px;position:relative}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.modal-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:var(--dark)}
.btn-close{background:none;border:none;font-size:22px;cursor:pointer;color:#9ca3af;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px}
.btn-close:hover{background:#f3f4f6;color:var(--dark)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:12px;font-weight:600;color:#374151;text-transform:uppercase;letter-spacing:0.05em}
.form-input,.form-select,.form-textarea{border:1px solid #d1d5db;border-radius:8px;padding:9px 12px;font-size:14px;font-family:'Inter',sans-serif;color:var(--dark);background:#fff;transition:border-color 0.15s;width:100%}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:#6b7280}
.form-textarea{resize:vertical;min-height:72px}
.form-section-title{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--dark);margin:4px 0 -4px;padding-bottom:8px;border-bottom:1px solid var(--border);grid-column:1/-1}
.tag-input-wrap{border:1px solid #d1d5db;border-radius:8px;padding:6px 8px;display:flex;flex-wrap:wrap;gap:5px;cursor:text;min-height:42px;transition:border-color 0.15s}
.tag-input-wrap:focus-within{border-color:#6b7280}
.tag{display:inline-flex;align-items:center;gap:4px;background:#f3f4f6;border-radius:5px;padding:3px 8px;font-size:12px;font-weight:500;color:var(--dark)}
.tag-remove{background:none;border:none;cursor:pointer;color:#9ca3af;font-size:13px;line-height:1;padding:0 1px}
.tag-remove:hover{color:#374151}
.tag-text-input{border:none;outline:none;font-size:13px;min-width:80px;font-family:'Inter',sans-serif;background:transparent;flex:1}
.modal-footer{display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.btn-cancel{background:none;border:1px solid var(--border);border-radius:8px;padding:9px 18px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;color:#374151;transition:background 0.15s}
.btn-cancel:hover{background:#f9fafb}
.btn-save{background:var(--dark);color:#fff;border:none;border-radius:8px;padding:9px 22px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity 0.15s}
.btn-save:hover{opacity:0.85}
.btn-delete{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:8px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-right:auto;transition:background 0.15s}
.btn-delete:hover{background:#fee2e2}

/* Leaflet */
.city-pin{display:flex;align-items:center;gap:5px}
.city-dot{width:14px;height:14px;border-radius:50%;border:2.5px solid rgba(255,255,255,0.9);box-shadow:0 1px 4px rgba(0,0,0,0.25);flex-shrink:0}
.city-label{background:rgba(255,255,255,0.92);border-radius:20px;padding:3px 9px;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;color:#1a1a2e;box-shadow:0 1px 4px rgba(0,0,0,0.15);white-space:nowrap}
.leaflet-popup-content-wrapper{border-radius:10px;font-family:'Inter',sans-serif;font-size:13px}
.leaflet-popup-content{margin:10px 14px;min-width:120px}
.popup-city{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;margin-bottom:6px}
.popup-name{padding:2px 0;color:#374151}

@media(max-width:1100px){
  .metrics-bar{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:800px){
  .map-charts-row{grid-template-columns:1fr}
  #map{height:320px}
}
@media(max-width:720px){
  .metrics-bar{grid-template-columns:1fr 1fr}
  .form-grid{grid-template-columns:1fr}
  .form-group.full{grid-column:1}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <span>Paravita</span><span class="logo-dot"></span><span>Poster Crew</span>
  </div>
  <div class="header-right">
    <div class="saved-indicator" id="savedIndicator">
      <div class="dot"></div><span id="savedText">Saved</span>
    </div>
    <button class="btn-add" onclick="openModal()">+ Add Crew</button>
  </div>
</header>

<!-- METRICS -->
<section class="metrics-bar" id="metricsBar"></section>

<!-- MAP + CHARTS -->
<div class="map-charts-row">
  <div id="map"></div>
  <div class="charts-col">
    <div class="chart-card">
      <div class="chart-title">Poster Progress per Crew</div>
      <canvas id="barChart"></canvas>
    </div>
  </div>
</div>

<!-- SHIPMENT TRACKER — full width -->
<div class="ship-section">
  <div class="ship-panel" id="shipPanel">
    <div class="ship-panel-header">
      <div class="ship-panel-title">📦 Shipment Tracker</div>
      <div class="ship-panel-counts" id="shipCounts"></div>
    </div>
    <div class="ship-list" id="shipList"></div>
  </div>
</div>

<!-- TRACKER -->
<section class="tracker">
  <div class="summary-bar" id="summaryBar"></div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Phone</th>
          <th>City</th>
          <th>Posters</th>
          <th>District</th>
          <th>PayPal</th>
          <th>Pre-Pay</th>
          <th>Post-Pay</th>
          <th>Total Paid</th>
          <th>Commission</th>
          <th>Alloc $</th>
          <th>Budget Paid</th>
          <th>Ship Address</th>
          <th>Ship Cost</th>
          <th style="text-align:center">Addr ✓</th>
          <th style="text-align:center">Shipped ✓</th>
          <th style="width:36px"></th>
        </tr>
      </thead>
      <tbody id="trackerBody"></tbody>
    </table>
  </div>
</section>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add Crew Member</div>
      <button class="btn-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Name</label>
        <input class="form-input" id="f-name" placeholder="Handle or name"/>
      </div>
      <div class="form-group">
        <label class="form-label">Payment Status</label>
        <select class="form-select" id="f-pay">
          <option value="unpaid">Unpaid</option>
          <option value="paid">Paid</option>
          <option value="partial">Partial</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Country</label>
        <select class="form-select" id="f-country">
          <option value="England">England</option>
          <option value="Netherlands">Netherlands</option>
          <option value="Germany">Germany</option>
          <option value="Portugal">Portugal</option>
          <option value="Spain">Spain</option>
          <option value="USA">USA</option>
          <option value="Texas">Texas</option>
          <option value="Canada">Canada</option>
          <option value="France">France</option>
          <option value="Ireland">Ireland</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">City</label>
        <input class="form-input" id="f-city" placeholder="City"/>
      </div>
      <div class="form-group">
        <label class="form-label">Posters Allocated</label>
        <input class="form-input" id="f-posters" type="number" min="0" value="0"/>
      </div>
      <div class="form-group">
        <label class="form-label">Posters Given</label>
        <input class="form-input" id="f-given" type="number" min="0" value="0"/>
      </div>
      <div class="form-group">
        <label class="form-label">Posters Put Up</label>
        <input class="form-input" id="f-done" type="number" min="0" value="0"/>
      </div>
      <div class="form-group">
        <label class="form-label">Commission ($)</label>
        <input class="form-input" id="f-commission" type="number" min="0" value="0"/>
      </div>

      <div class="form-section-title">Payments</div>
      <div class="form-group">
        <label class="form-label">Budget Allocated ($)</label>
        <input class="form-input" id="f-budgetAlloc" type="number" min="0" value="0"/>
      </div>
      <div class="form-group">
        <label class="form-label">Budget Paid ($)</label>
        <input class="form-input" id="f-budgetPaid" type="number" min="0" value="0"/>
      </div>
      <div class="form-group">
        <label class="form-label">Pre-Activation Amount ($)</label>
        <input class="form-input" id="f-prePayAmt" type="number" min="0" value="0"/>
      </div>
      <div class="form-group">
        <label class="form-label">Post-Activation Amount ($)</label>
        <input class="form-input" id="f-postPayAmt" type="number" min="0" value="0"/>
      </div>

      <div class="form-section-title">Shipment</div>
      <div class="form-group full">
        <label class="form-label">Shipment Address</label>
        <input class="form-input" id="f-shipmentAddress" placeholder="Street, City, Postcode"/>
      </div>
      <div class="form-group">
        <label class="form-label">Shipment Cost ($)</label>
        <input class="form-input" id="f-shipmentCost" type="number" min="0" value="0"/>
      </div>
      <div class="form-group">
        <label class="form-label">Carrier</label>
        <select class="form-select" id="f-trackingCarrier">
          <option value="">— Select carrier —</option>
          <option value="UPS">UPS</option>
          <option value="FedEx">FedEx</option>
          <option value="USPS">USPS</option>
          <option value="Canada Post">Canada Post</option>
          <option value="Royal Mail">Royal Mail</option>
          <option value="DHL">DHL</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Tracking Number</label>
        <input class="form-input" id="f-trackingNumber" placeholder="e.g. 1Z999AA10123456784"/>
      </div>
      <div class="form-group">
        <label class="form-label">Delivery Status</label>
        <select class="form-select" id="f-trackingStatus">
          <option value="">— Not shipped —</option>
          <option value="label">Label Created</option>
          <option value="transit">In Transit</option>
          <option value="out">Out for Delivery</option>
          <option value="delivered">Delivered</option>
          <option value="exception">Exception</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Est. Delivery Date</label>
        <input class="form-input" id="f-trackingETA" type="date"/>
      </div>

      <div class="form-section-title">Contact &amp; Notes</div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="form-input" id="f-phone" placeholder="+1 555 000 0000"/>
      </div>
      <div class="form-group">
        <label class="form-label">PayPal Email</label>
        <input class="form-input" id="f-paypalEmail" placeholder="paypal@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Contact / Instagram</label>
        <input class="form-input" id="f-contact" placeholder="@handle"/>
      </div>
      <div class="form-group">
        <label class="form-label">Referred By</label>
        <input class="form-input" id="f-referredBy" placeholder="Name"/>
      </div>
      <div class="form-group full">
        <label class="form-label">Streets / Districts</label>
        <div class="tag-input-wrap" id="tagWrap" onclick="document.getElementById('tagInput').focus()">
          <input class="tag-text-input" id="tagInput" placeholder="Type and press Enter…" onkeydown="handleTagKey(event)"/>
        </div>
      </div>
      <div class="form-group full">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="f-notes" placeholder="Any notes…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-delete" id="btnDelete" style="display:none" onclick="deleteCrew()">Delete</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="submitModal()">Save</button>
    </div>
  </div>
</div>

// ─── Default crew object (includes all new fields) ────────────────────────────
function crewDefaults(overrides) {
  return {
    id: crypto.randomUUID(),
    name: '', country: 'England', city: '',
    posters: 0, given: 0, done: 0,
    pay: 'unpaid',
    commission: 0, budgetAlloc: 0, budgetPaid: 0,

    streets: [], notes: '',
    paypalEmail: '',
    district: '',
    ...overrides,
  };
}

// ─── Persistence ──────────────────────────────────────────────────────────────
function applyMigration(m) {
  return {
    prePayAmt: 0, postPayAmt: 0,
    shipmentCost: 0, shipmentAddress: '',
    trackingCarrier: '', trackingNumber: '',
    trackingStatus: '', trackingETA: '',
    paypalEmail: '', streets: [], district: '',
    ...m,
  };
}

async function loadData() {
  // ── Try Supabase first ──
  try {
    const { data, error } = await sb.from('crew').select('*');
    if (!error && data) {
      if (data.length > 0) {
        // Supabase has data — use it as source of truth
        crew = data.map(applyMigration);
        persistData(); // mirror to localStorage
        return;
      }
      // Supabase reachable but empty — seed it from localStorage or defaults
      const raw = localStorage.getItem(LS_KEY);
      crew = raw
        ? JSON.parse(raw).map(applyMigration)
        : SEED.map(s => crewDefaults({ id: crypto.randomUUID(), name: s.name, country: s.country, city: s.city, posters: s.posters, streets: s.streets }));
      persistData();
      for (const m of crew) await syncRow(m);
      return;
    }
  } catch (e) {
    console.warn('Supabase unavailable, falling back to localStorage');
  }

  // ── Supabase offline — use localStorage ──
  const raw = localStorage.getItem(LS_KEY);
  if (raw) {
    crew = JSON.parse(raw).map(applyMigration);
  } else {
    crew = SEED.map(s => crewDefaults({ id: crypto.randomUUID(), name: s.name, country: s.country, city: s.city, posters: s.posters, streets: s.streets }));
    persistData();
  }
}

function persistData() {
  localStorage.setItem(LS_KEY, JSON.stringify(crew));
}

  const ind = document.getElementById('savedIndicator');
  const txt = document.getElementById('savedText');
  ind.classList.add('saving');
  txt.textContent = 'Saving…';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    ind.classList.remove('saving');
    txt.textContent = 'Saved';
  }, 700);
}

function saveData() {
  persistData();

}

// ─── Field updates ────────────────────────────────────────────────────────────
const NUM_FIELDS = ['posters','given','done','commission','budgetAlloc','budgetPaid',
                    'prePayAmt','postPayAmt','shipmentCost'];

function fmtMoney(n) {
  return '$' + (parseFloat(n) || 0).toFixed(2);
}

function updateField(id, field, value) {
  const m = crew.find(c => c.id === id);
  if (!m) return;
  m[field] = NUM_FIELDS.includes(field) ? (parseFloat(value) || 0) : value;
  saveData();
  syncRow(m);
  // Instantly update Total Paid cell without re-rendering the whole table
  if (field === 'prePayAmt' || field === 'postPayAmt') {
    const cell = document.getElementById('tp-' + id);
    if (cell) cell.textContent = fmtMoney((m.prePayAmt || 0) + (m.postPayAmt || 0));
  }
  debouncedRender();
}

function updateCheckbox(id, field, checked) {
  const m = crew.find(c => c.id === id);
  if (!m) return;
  m[field] = checked;
  saveData();
  syncRow(m);
  renderSummary();
}

function updateTracking(id, field, value) {
  const m = crew.find(c => c.id === id);
  if (!m) return;
  m[field] = value;
  saveData();
  syncRow(m);
  renderShipmentTracker();
}

function debouncedRender() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(() => {
    renderMetrics();
    renderBarChart();
    renderMap();
    renderShipmentTracker();
  }, 300);
}

  const totalPaid  = crew.reduce((s,c) => s + (c.budgetPaid||0),  0);
  const remaining  = TOTAL_BUDGET - totalPaid;
  const pctGiven   = Math.min(totalGiven / TOTAL_POSTERS * 100, 100).toFixed(1);
  const pctDone    = Math.min(totalDone  / TOTAL_POSTERS * 100, 100).toFixed(1);

  document.getElementById('metricsBar').innerHTML = `
    <div class="metric-card">
      <div class="metric-label">Total Posters</div>
      <div class="metric-val">${TOTAL_POSTERS.toLocaleString()}</div>
      <div class="metric-sub">Campaign target</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Posters Given Out</div>
      <div class="metric-val">${totalGiven.toLocaleString()}</div>
      <div class="metric-sub">${pctGiven}% of total</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pctGiven}%"></div></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Posters Put Up</div>
      <div class="metric-val">${totalDone.toLocaleString()}</div>
      <div class="metric-sub">${pctDone}% of total</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pctDone}%"></div></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Budget</div>
      <div class="metric-val">$${totalPaid.toLocaleString()}</div>
      <div class="metric-sub">$${totalAlloc.toLocaleString()} allocated · $${TOTAL_BUDGET.toLocaleString()} total</div>
    </div>
    <div class="metric-card ${remaining < 2000 ? 'danger' : ''}">
      <div class="metric-label">Budget Remaining</div>
      <div class="metric-val">$${remaining.toLocaleString()}</div>
      <div class="metric-sub">${remaining < 2000 ? '⚠ Running low' : 'Available to spend'}</div>
    </div>
  `;
}

function initMap() {
  leafletMap = L.map('map', {zoomControl:true}).setView([48,-20], 4);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {

    subdomains:'abcd', maxZoom:19,
  }).addTo(leafletMap);
}

function renderMap() {
  mapMarkers.forEach(m => m.remove());
  mapMarkers = [];
  const byCity = {};
  crew.forEach(c => {
    if (!byCity[c.city]) byCity[c.city] = {names:[], country:c.country};
    byCity[c.city].names.push(c.name);
  });
  Object.entries(byCity).forEach(([city, {names, country}]) => {
    const coords = CITY_COORDS[city];
    if (!coords) return;
    const color = COUNTRY_COLORS[country] || '#6b7280';
    const label = names.length > 1 ? `${city} ×${names.length}` : city;
    const icon = L.divIcon({
      className:'',
      html:`<div class="city-pin"><div class="city-dot" style="background:${color}"></div><div class="city-label">${label}</div></div>`,
      iconAnchor:[7,7],
    });
    const popup = `<div class="popup-city">${city}</div>` + names.map(n=>`<div class="popup-name">${n}</div>`).join('');
    mapMarkers.push(L.marker(coords,{icon}).addTo(leafletMap).bindPopup(popup));
  });
  // Placeholder pins for territories with no crew yet
  [['Paris','France'],['Dublin','Ireland']].forEach(([city, country]) => {
    if (byCity[city]) return; // already rendered above
    const coords = CITY_COORDS[city];
    const color = COUNTRY_COLORS[country];
    const icon = L.divIcon({
      className:'',
      html:`<div class="city-pin"><div class="city-dot" style="background:${color};opacity:0.5"></div><div class="city-label" style="opacity:0.6">${city}</div></div>`,
      iconAnchor:[7,7],
    });
    mapMarkers.push(L.marker(coords,{icon}).addTo(leafletMap).bindPopup(`<div class="popup-city">${city}</div><div class="popup-name" style="color:#999">No crew yet</div>`));
  });
}

// ─── Bar chart ────────────────────────────────────────────────────────────────
function renderBarChart() {
  const labels    = crew.map(c => c.name.length > 10 ? c.name.slice(0,10)+'…' : c.name);
  const allocated = crew.map(c => c.posters||0);
  const given     = crew.map(c => c.given||0);

  if (barChartInst) barChartInst.destroy();
  barChartInst = new Chart(document.getElementById('barChart'), {
    type:'bar',
    data:{
      labels,
      datasets:[
        {label:'Allocated',data:allocated,backgroundColor:'rgba(26,26,46,0.15)',borderRadius:3},
        {label:'Given',    data:given,    backgroundColor:'rgba(26,26,46,0.5)',  borderRadius:3},
        {label:'Put Up',   data:done,     backgroundColor:'rgba(26,26,46,0.9)',  borderRadius:3},
      ]

    options:{
      responsive:true, maintainAspectRatio:true,
      plugins:{legend:{labels:{font:{family:'Inter',size:11},boxWidth:12}}},
      scales:{
        x:{ticks:{font:{family:'Inter',size:10},maxRotation:45},grid:{display:false}},
        y:{ticks:{font:{family:'Inter',size:10}},beginAtZero:true},
      }
    }
  });

            </div>
          </td>
          <td>
            <div class="pay-cell">
              <div class="pay-cell-top">
                <input type="checkbox" ${m.postPayDone?'checked':''} onchange="updateCheckbox('${id}','postPayDone',this.checked)"/>
                ${cbBadge(m.postPayDone,'Paid')}
              </div>
              <input class="pay-amt-input" type="number" min="0" step="0.01" placeholder="0.00"
                value="${(parseFloat(m.postPayAmt)||0).toFixed(2)}"
                oninput="updateField('${id}','postPayAmt',this.value)"
                onchange="updateField('${id}','postPayAmt',this.value)"/>
            </div>
          </td>
          <td class="total-paid-cell" id="tp-${id}">${fmtMoney(totalPaid)}</td>
          <td><input class="inline-input" type="number" min="0" value="${m.commission||0}"
            oninput="updateField('${id}','commission',this.value)" style="width:65px"/></td>
          <td><input class="inline-input" type="number" min="0" value="${m.budgetAlloc||0}"
            oninput="updateField('${id}','budgetAlloc',this.value)" style="width:65px"/></td>
          <td><input class="inline-input" type="number" min="0" value="${m.budgetPaid||0}"
            oninput="updateField('${id}','budgetPaid',this.value)" style="width:65px"/></td>
          <td><input class="inline-input addr" value="${esc(m.shipmentAddress)}" placeholder="Address"
            oninput="updateField('${id}','shipmentAddress',this.value)"/></td>
          <td><input class="inline-input" type="number" min="0" value="${m.shipmentCost||0}"
            oninput="updateField('${id}','shipmentCost',this.value)" style="width:65px"/></td>
          <td>
            <div style="display:flex;align-items:center;gap:5px;justify-content:center">
              <input type="checkbox" ${m.addressDone?'checked':''} onchange="updateCheckbox('${id}','addressDone',this.checked)"/>
              ${cbBadge(m.addressDone,'✓')}
            </div>
          </td>
          <td>
            <div style="display:flex;align-items:center;gap:5px;justify-content:center">
              <input type="checkbox" ${m.shipmentDone?'checked':''} onchange="updateCheckbox('${id}','shipmentDone',this.checked)"/>
              ${cbBadge(m.shipmentDone,'Sent')}
            </div>
          </td>
          <td>
            <button class="btn-edit" onclick="openModal('${id}')" title="Edit">✏️</button>
          </td>
        </tr>
      `;
    });
  });
  tbody.innerHTML = html;
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function openModal(id) {
  editingId = id || null;
  modalTags = [];
  document.getElementById('modalTitle').textContent = id ? 'Edit Crew Member' : 'Add Crew Member';
  document.getElementById('btnDelete').style.display = id ? 'block' : 'none';

  if (id) {
    const m = crew.find(c => c.id === id);
    document.getElementById('f-name').value            = m.name;
    document.getElementById('f-pay').value             = m.pay;
    document.getElementById('f-country').value         = m.country;
    document.getElementById('f-city').value            = m.city;
    document.getElementById('f-posters').value         = m.posters || 0;
    document.getElementById('f-given').value           = m.given   || 0;
    document.getElementById('f-done').value            = m.done    || 0;
    document.getElementById('f-commission').value      = m.commission  || 0;
    document.getElementById('f-budgetAlloc').value     = m.budgetAlloc || 0;
    document.getElementById('f-budgetPaid').value      = m.budgetPaid  || 0;
    document.getElementById('f-prePayAmt').value       = m.prePayAmt   || 0;
    document.getElementById('f-postPayAmt').value      = m.postPayAmt  || 0;
    document.getElementById('f-shipmentAddress').value = m.shipmentAddress || '';
    document.getElementById('f-shipmentCost').value    = m.shipmentCost    || 0;
    document.getElementById('f-trackingCarrier').value = m.trackingCarrier || '';
    document.getElementById('f-trackingNumber').value  = m.trackingNumber  || '';
    document.getElementById('f-trackingStatus').value  = m.trackingStatus  || '';
    document.getElementById('f-trackingETA').value     = m.trackingETA     || '';
    document.getElementById('f-phone').value           = m.phone      || '';
    document.getElementById('f-paypalEmail').value     = m.paypalEmail || '';
    document.getElementById('f-contact').value         = m.contact    || '';
    document.getElementById('f-referredBy').value      = m.referredBy || '';
    document.getElementById('f-notes').value           = m.notes      || '';
    modalTags = [...(m.streets||[])];
  } else {
    ['f-name','f-city','f-phone','f-paypalEmail','f-contact','f-referredBy','f-notes',
     'f-shipmentAddress','f-trackingNumber','f-trackingETA'].forEach(k => document.getElementById(k).value = '');
    ['f-posters','f-given','f-done','f-commission','f-budgetAlloc','f-budgetPaid',
     'f-prePayAmt','f-postPayAmt','f-shipmentCost'].forEach(k => document.getElementById(k).value = 0);
    document.getElementById('f-pay').value             = 'unpaid';
    document.getElementById('f-country').value         = 'England';
    document.getElementById('f-trackingCarrier').value = '';
    document.getElementById('f-trackingStatus').value  = '';
  }

  renderTags();
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
  modalTags = [];
}

function overlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function submitModal() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Name is required.'); return; }

  const data = {
    name,
    pay:             document.getElementById('f-pay').value,
    country:         document.getElementById('f-country').value,
    city:            document.getElementById('f-city').value.trim(),
    posters:         parseFloat(document.getElementById('f-posters').value)     || 0,
    given:           parseFloat(document.getElementById('f-given').value)       || 0,
    done:            parseFloat(document.getElementById('f-done').value)        || 0,
    commission:      parseFloat(document.getElementById('f-commission').value)  || 0,
    budgetAlloc:     parseFloat(document.getElementById('f-budgetAlloc').value) || 0,
    budgetPaid:      parseFloat(document.getElementById('f-budgetPaid').value)  || 0,
    prePayAmt:       parseFloat(document.getElementById('f-prePayAmt').value)   || 0,
    postPayAmt:      parseFloat(document.getElementById('f-postPayAmt').value)  || 0,
    shipmentAddress: document.getElementById('f-shipmentAddress').value.trim(),
    shipmentCost:    parseFloat(document.getElementById('f-shipmentCost').value) || 0,
    trackingCarrier: document.getElementById('f-trackingCarrier').value,
    trackingNumber:  document.getElementById('f-trackingNumber').value.trim(),
    trackingStatus:  document.getElementById('f-trackingStatus').value,
    trackingETA:     document.getElementById('f-trackingETA').value,
    phone:           document.getElementById('f-phone').value.trim(),
    paypalEmail:     document.getElementById('f-paypalEmail').value.trim(),
    contact:         document.getElementById('f-contact').value.trim(),
    referredBy:      document.getElementById('f-referredBy').value.trim(),
    notes:           document.getElementById('f-notes').value.trim(),
    streets:         [...modalTags],
  };

  let saved;
  if (editingId) {
    const idx = crew.findIndex(c => c.id === editingId);
    if (idx !== -1) { crew[idx] = {...crew[idx], ...data}; saved = crew[idx]; }
  } else {
    saved = crewDefaults(data);
    crew.push(saved);
  }

  saveData();
  if (saved) syncRow(saved);
  renderAll();
  closeModal();
}

function deleteCrew() {
  if (!editingId) return;
  if (!confirm('Remove this crew member? This cannot be undone.')) return;
  const idToDelete = editingId;
  crew = crew.filter(c => c.id !== idToDelete);
  saveData();
  deleteRow(idToDelete);
  renderAll();
  closeModal();
}

// ─── Tag input ────────────────────────────────────────────────────────────────
function renderTags() {
  const wrap = document.getElementById('tagWrap');
  const input = document.getElementById('tagInput');
  wrap.querySelectorAll('.tag').forEach(t => t.remove());
  modalTags.forEach((tag, i) => {
    const el = document.createElement('div');
    el.className = 'tag';
    el.innerHTML = `${esc(tag)}<button class="tag-remove" onclick="removeTag(${i})">×</button>`;
    wrap.insertBefore(el, input);
  });
}

function handleTagKey(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim().replace(/,$/, '');
    if (val && !modalTags.includes(val)) { modalTags.push(val); renderTags(); }
    e.target.value = '';
  } else if (e.key === 'Backspace' && !e.target.value && modalTags.length) {
    modalTags.pop();
    renderTags();
  }
}

function removeTag(i) {
  modalTags.splice(i, 1);
  renderTags();
}

// ─── Render all ───────────────────────────────────────────────────────────────
function renderAll() {
  renderMetrics();
  renderMap();
  renderBarChart();
  renderShipmentTracker();
  renderTable();
  renderSummary();
}

// ─── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  await loadData();
  initMap();
  renderAll();
})();
</script>
